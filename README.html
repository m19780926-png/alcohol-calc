<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アルコール計算アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(180deg, #f0f4ff, #ffffff);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }

    .card {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
      margin-top: 10px;
      display: block;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .btn-area {
      margin-top: 15px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 15px;
      border-radius: 8px;
      border: none;
      color: #fff;
      cursor: pointer;
    }

    .btn-main { background: #0078d4; }
    .btn-add  { background: #28a745; }
    .btn-reset{ background: #d9534f; }

    .result-box {
      background: #f7faff;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #0078d4;
      font-size: 14px;
      line-height: 1.6;
    }

    .total-box {
      background: #f9fff7;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #28a745;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<h1>アルコール計算アプリ</h1>

<div class="card">
  <label>コップの容量（ml）</label>
  <input type="number" id="glassVolume" placeholder="例：500">

  <label>希望アルコール度数（％）</label>
  <input type="number" id="targetPercent" placeholder="例：9">

  <label>原液の度数（％）</label>
  <input type="number" id="basePercent" placeholder="例：40">

  <div class="btn-area">
    <button class="btn-main" onclick="calcOnce()">計算</button>
    <button class="btn-add" onclick="addToTotal()">累計に追加</button>
    <button class="btn-reset" onclick="resetTotal()">リセット</button>
  </div>
</div>

<div class="card">
  <strong>◆今回の結果</strong>
  <div id="currentResult" class="result-box">まだ計算していません。</div>
</div>

<div class="card">
  <strong>◆累計</strong>
  <div id="totalResult" class="total-box">累計純アルコール量：0 g<br>累計単位数：0 単位</div>
</div>

<script>
  let totalPure = 0;

  function getInputs() {
    const g = parseFloat(document.getElementById('glassVolume').value);
    const t = parseFloat(document.getElementById('targetPercent').value);
    const b = parseFloat(document.getElementById('basePercent').value);

    if (!g || g <= 0) return alert("コップ容量を入力してください。"), null;
    if (!t || t <= 0) return alert("希望度数を入力してください。"), null;
    if (!b || b <= 0) return alert("原液度数を入力してください。"), null;

    return { g, t, b };
  }

  function calcOnce() {
    const v = getInputs();
    if (!v) return;

    const baseVolume = v.t * v.g / v.b;
    const pure = baseVolume * (v.b / 100) * 0.8;
    const unit = pure / 20;

    const box = document.getElementById("currentResult");
    box.innerHTML =
      `・コップ容量：${v.g} ml<br>
       ・希望度数：${v.t} %<br>
       ・原液度数：${v.b} %<br><br>
       ⇒ 必要な原液量：約 ${baseVolume.toFixed(1)} ml<br>
       ⇒ 純アルコール量：約 ${pure.toFixed(1)} g<br>
       ⇒ 単位数（20g）：約 ${unit.toFixed(2)} 単位`;

    box.dataset.pure = pure;
  }

  function addToTotal() {
    const pure = parseFloat(document.getElementById("currentResult").dataset.pure);
    if (!pure) return alert("まず計算してください。");

    totalPure += pure;
    updateTotal();
  }

  function resetTotal() {
    if (!confirm("累計をリセットしますか？")) return;
    totalPure = 0;
    updateTotal();
  }

  function updateTotal() {
    const unit = totalPure / 20;
    document.getElementById("totalResult").innerHTML =
      `累計純アルコール量：${totalPure.toFixed(1)} g<br>
       累計単位数：${unit.toFixed(2)} 単位`;
  }
</script>

</body>
</html>
